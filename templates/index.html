<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: #F0F4FF; height: 100vh; display: flex; align-items: center; justify-content: center; }

        .chat-wrapper {
            width: 420px;
            height: 680px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .chat-header {
            background: #4F46E5;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .header-info .name {
            color: white;
            font-size: 1rem;
            font-weight: 600;
        }
        .header-info .status {
            color: rgba(255,255,255,0.7);
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background: #4ADE80;
            border-radius: 50%;
        }
        .clear-btn {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.25); }

        /* MESSAGES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #F8F9FF;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #C7D2FE; border-radius: 4px; }

        /* WELCOME */
        .welcome {
            text-align: center;
            padding: 20px 10px;
        }
        .welcome .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .welcome h3 { color: #1E293B; font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
        .welcome p { color: #94A3B8; font-size: 0.83rem; line-height: 1.5; }

        /* MESSAGE BUBBLES */
        .msg {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .msg.user { flex-direction: row-reverse; }

        .bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.88rem;
            line-height: 1.5;
        }
        .msg.bot .bubble {
            background: white;
            color: #334155;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .msg.user .bubble {
            background: #4F46E5;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .msg.bot .msg-avatar { background: #EEF2FF; }
        .msg.user .msg-avatar { background: #C7D2FE; }

        .time {
            font-size: 0.7rem;
            color: #CBD5E1;
            margin-top: 3px;
            text-align: right;
        }
        .msg.bot .time { text-align: left; }

        /* TYPING */
        .typing { display: none; }
        .typing .bubble {
            background: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .dots { display: flex; gap: 4px; padding: 4px 2px; }
        .dot {
            width: 7px; height: 7px;
            background: #C7D2FE;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* INPUT */
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #F1F5F9;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.88rem;
            color: #334155;
            resize: none;
            outline: none;
            max-height: 100px;
            transition: border 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .input-area textarea:focus { border-color: #4F46E5; }
        .input-area textarea::placeholder { color: #CBD5E1; }

        .send-btn {
            width: 42px;
            height: 42px;
            background: #4F46E5;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: #4338CA; transform: scale(1.05); }
        .send-btn svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <!-- HEADER -->
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <div class="name">Support Assistant</div>
                <div class="status">
                    <div class="status-dot"></div>
                    Online — Ready to help
                </div>
            </div>
            <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
        </div>

        <!-- MESSAGES -->
        <div class="messages" id="messages">
            <div class="welcome">
                <div class="icon">👋</div>
                <h3>Hello! How can I help you?</h3>
                <p>Ask me anything about orders, products, returns or any other questions!</p>
            </div>

            <div class="msg bot typing" id="typing">
                <div class="msg-avatar">🤖</div>
                <div class="bubble">
                    <div class="dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <textarea 
                id="userInput" 
                placeholder="Type your message..." 
                rows="1"
                onkeydown="handleKey(event)"
            ></textarea>
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const sessionId = Math.random().toString(36).substring(7);
        const messages = document.getElementById('messages');
        const typing = document.getElementById('typing');
        const input = document.getElementById('userInput');

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = `
                <div class="msg-avatar">${isUser ? '👤' : '🤖'}</div>
                <div>
                    <div class="bubble">${text}</div>
                    <div class="time">${getTime()}</div>
                </div>
            `;
            messages.insertBefore(div, typing);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';
            input.style.height = 'auto';

            typing.style.display = 'flex';
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: text })
                });
                const data = await res.json();
                typing.style.display = 'none';
                addMessage(data.reply, false);
            } catch (e) {
                typing.style.display = 'none';
                addMessage('Sorry, something went wrong. Please try again!', false);
            }
        }

        async function clearChat() {
            await fetch('/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            });
            const msgs = messages.querySelectorAll('.msg:not(#typing)');
            msgs.forEach(m => m.remove());
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
    </script>
</body>
</html>
